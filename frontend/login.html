<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketMind — Sign In</title>
  <link rel="stylesheet" href="global.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

    canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      margin: 20px;
      padding: 44px 40px 36px;
      border-radius: var(--r-lg);
      background: rgba(13,31,50,.92);
      border: 1px solid var(--border-h);
      box-shadow: 0 32px 80px rgba(0,0,0,.55), var(--glow-blue, 0 0 28px rgba(56,189,248,.18));
    }

    .login-wrap::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
      background: var(--grad); border-radius: 2px; opacity: .8;
    }

    /* Logo */
    .logo-row { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 6px; }
    .logo-text { font-family: var(--font-ui); font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: -.03em; }
    .logo-text em { font-style: normal; color: var(--blue); }
    .logo-sub { text-align: center; font-family: var(--font-serif); font-style: italic; color: var(--muted); font-size: .9rem; margin-bottom: 28px; }

    /* Hint box */
    .hint-box {
      background: rgba(56,189,248,.07); border: 1px solid rgba(56,189,248,.15);
      border-radius: var(--r-sm); padding: 9px 14px;
      font-size: .78rem; color: var(--text-dim); font-family: var(--font-ui);
      margin-bottom: 22px; line-height: 1.5;
    }
    .hint-box strong { color: var(--blue); }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .field input {
      width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 12px 42px;
      color: var(--text); font-family: var(--font-serif); font-size: .95rem;
      outline: none; transition: border-color var(--ease), box-shadow var(--ease);
    }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(56,189,248,.14); }
    .field input::placeholder { color: rgba(74,112,144,.55); font-style: italic; }
    .field input.err { border-color: var(--red); }
    .pw-toggle { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; transition: color var(--ease); }
    .pw-toggle:hover { color: var(--blue); }
    .field-error { font-size: .75rem; color: var(--red); font-family: var(--font-ui); min-height: 1em; }

    .alert-error {
      background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2);
      border-radius: var(--r-sm); padding: 10px 14px;
      font-size: .82rem; color: var(--red); font-family: var(--font-ui);
      text-align: center; display: none;
    }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--btn-grad); border: none; border-radius: var(--r-sm);
      color: #fff; font-family: var(--font-ui); font-size: 1rem; font-weight: 600;
      cursor: pointer; letter-spacing: .02em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 18px rgba(56,189,248,.28);
      transition: transform .18s, box-shadow .18s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(56,189,248,.38); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .login-wrap { padding: 32px 22px 28px; }
      .logo-text { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="login-wrap">
  <div class="logo-row">
    <svg width="44" height="32" viewBox="0 0 60 40" fill="none">
      <circle cx="28" cy="14" r="5" fill="#4ade80"/>
      <circle cx="18" cy="26" r="4" fill="#38bdf8"/>
      <circle cx="40" cy="20" r="4" fill="#818cf8"/>
      <polyline points="18,26 28,14 40,20" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <defs><linearGradient id="lg" x1="18" y1="26" x2="40" y2="20" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#4ade80"/></linearGradient></defs>
    </svg>
    <div class="logo-text">Market<em>Mind</em></div>
  </div>
  <p class="logo-sub">AI-powered stock predictions</p>

  <div class="hint-box">
    Demo credentials — any of: <strong>mitesh · purva · priyanka · manish · rajeev</strong><br>
    Password: <strong>123456</strong>
  </div>

  <form class="form" id="loginForm" novalidate>
    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
        <input type="text" id="username" placeholder="Enter username…" autocomplete="username"/>
        <input type="text" style="display:none" name="fakeuser" autocomplete="username"/>
      </div>
      <div class="field-error" id="usernameErr"></div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="field-error" id="pwErr"></div>
    </div>

    <div class="alert-error" id="loginAlert"></div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span id="btnLabel">Sign In</span>
      <div class="spinner hidden" id="btnSpinner"></div>
    </button>

    <div style="text-align: center; margin-top: 20px;">
      <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 12px;">New user? <a href="#" id="showSignupBtn" style="color: var(--blue); text-decoration: none; font-weight: 600;">Create Account</a></p>
    </div>
  </form>

  <!-- Signup Form (Hidden by default) -->
  <form class="form" id="signupForm" style="display: none;" novalidate>
    <div class="field">
      <label for="signupName">Full Name</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
        <input type="text" id="signupName" placeholder="Enter your full name…" autocomplete="name"/>
      </div>
      <div class="field-error" id="signupNameErr"></div>
    </div>

    <div class="field">
      <label for="signupEmail">Email</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        <input type="email" id="signupEmail" placeholder="Enter your email…" autocomplete="email"/>
      </div>
      <div class="field-error" id="signupEmailErr"></div>
    </div>

    <div class="field">
      <label for="signupPassword">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="signupPassword" placeholder="Create password…" autocomplete="new-password"/>
        <button type="button" class="pw-toggle" id="signupPwToggle" aria-label="Show password">
          <svg id="signupEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="field-error" id="signupPwErr"></div>
    </div>

    <div class="alert-error" id="signupAlert"></div>

    <button type="submit" class="btn-submit" id="signupSubmitBtn">
      <span id="signupBtnLabel">Create Account</span>
      <div class="spinner hidden" id="signupBtnSpinner"></div>
    </button>

    <div style="text-align: center; margin-top: 20px;">
      <p style="color: var(--muted); font-size: 0.85rem;">Already have an account? <a href="#" id="showLoginBtn" style="color: var(--blue); text-decoration: none; font-weight: 600;">Sign In</a></p>
    </div>
  </form>
</div>

<script>
const API = window.location.hostname === 'localhost' 
  ? 'http://localhost:5000/api' 
  : 'https://marketmind-backend.onrender.com/api';

/* ── Canvas background ─────────────────────────────────────── */
(function() {
  const c = document.getElementById('bg'), ctx = c.getContext('2d');
  let W, H, candles = [];
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function mk() { const bH=20+Math.random()*80; return { x:Math.random()*W, y:H+bH+20, bH, wT:5+Math.random()*25, wB:5+Math.random()*25, w:6+Math.random()*10, sp:.2+Math.random()*.6, op:.04+Math.random()*.12, bull:Math.random()>.45 }; }
  for(let i=0;i<42;i++){const c=mk();c.y=Math.random()*H;candles.push(c);}
  function draw(c){const col=c.bull?'rgba(74,222,128,':'rgba(56,189,248,';ctx.globalAlpha=c.op;ctx.strokeStyle=col+'1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(c.x,c.y-c.bH-c.wT);ctx.lineTo(c.x,c.y-c.bH);ctx.stroke();ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(c.x,c.y+c.wB);ctx.stroke();ctx.fillStyle=col+'.75)';ctx.fillRect(c.x-c.w/2,c.y-c.bH,c.w,c.bH);ctx.globalAlpha=1;}
  (function tick(){ctx.clearRect(0,0,W,H);candles.forEach(c=>{c.y-=c.sp;if(c.y+c.bH+c.wB<-10)Object.assign(c,mk());draw(c);});requestAnimationFrame(tick);})();
})();

/* ── Toggle password visibility ──────────────────────────── */
document.getElementById('pwToggle').addEventListener('click', () => {
  const inp = document.getElementById('password');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
});

document.getElementById('signupPwToggle').addEventListener('click', () => {
  const inp = document.getElementById('signupPassword');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
});

/* ── Form switching ─────────────────────────────────────────── */
document.getElementById('showSignupBtn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'flex';
  document.querySelector('.hint-box').style.display = 'none';
});

document.getElementById('showLoginBtn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'flex';
  document.querySelector('.hint-box').style.display = 'block';
});

/* ── Email validation ─────────────────────────────────────────── */
function isValidEmail(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email);
}

/* ── Signup form submit ──────────────────────────────────────── */
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const alert = document.getElementById('signupAlert');
  const btn = document.getElementById('signupSubmitBtn');
  const label = document.getElementById('signupBtnLabel');
  const spinner = document.getElementById('signupBtnSpinner');

  // Reset errors
  alert.style.display = 'none';
  document.getElementById('signupNameErr').textContent = '';
  document.getElementById('signupEmailErr').textContent = '';
  document.getElementById('signupPwErr').textContent = '';

  // Validation
  if (!name) { document.getElementById('signupNameErr').textContent = 'Name is required.'; return; }
  if (!email) { document.getElementById('signupEmailErr').textContent = 'Email is required.'; return; }
  if (!isValidEmail(email)) { document.getElementById('signupEmailErr').textContent = 'Please enter a valid email.'; return; }
  if (!password) { document.getElementById('signupPwErr').textContent = 'Password is required.'; return; }
  if (password.length < 4) { document.getElementById('signupPwErr').textContent = 'Password must be at least 4 characters.'; return; }

  // Check if user already exists
  const existingUser = localStorage.getItem(email);
  if (existingUser) {
    alert.textContent = 'An account with this email already exists.';
    alert.style.display = 'block';
    return;
  }

  // Loading state
  btn.disabled = true; label.textContent = 'Creating account…'; spinner.classList.remove('hidden');

  try {
    // Save user to localStorage
    const userData = {
      name: name,
      email: email,
      password: password
    };
    localStorage.setItem(email, JSON.stringify(userData));
    
    console.log('Signup successful:', { name, email });
    
    // Auto-login after signup
    localStorage.setItem('loggedInUser', name);
    localStorage.setItem('loggedInEmail', email);
    
    // Redirect to dashboard
    window.location.href = 'mainindex.html';
    
  } catch (error) {
    console.error('Signup error:', error);
    alert.textContent = 'Failed to create account. Please try again.';
    alert.style.display = 'block';
  } finally {
    btn.disabled = false; label.textContent = 'Create Account'; spinner.classList.add('hidden');
  }
});

/* ── Login form submit ─────────────────────────────────────────── */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alert = document.getElementById('loginAlert');
  const btn = document.getElementById('submitBtn');
  const label = document.getElementById('btnLabel');
  const spinner = document.getElementById('btnSpinner');

  // Reset errors
  alert.style.display = 'none';
  document.getElementById('usernameErr').textContent = '';
  document.getElementById('pwErr').textContent = '';

  if (!username) { document.getElementById('usernameErr').textContent = 'Username or email is required.'; return; }
  if (!password) { document.getElementById('pwErr').textContent = 'Password is required.'; return; }

  // Loading state
  btn.disabled = true; label.textContent = 'Signing in…'; spinner.classList.remove('hidden');

  try {
    console.log('Login attempt:', { username });
    
    // Try localStorage authentication first (for new users)
    let user = null;
    
    // Check if username is an email
    if (isValidEmail(username)) {
      const userData = localStorage.getItem(username);
      if (userData) {
        user = JSON.parse(userData);
      }
    } else {
      // Check if it's a demo user
      const USERS = { mitesh:'123456', purva:'123456', priyanka:'123456', manish:'123456', rajeev:'123456' };
      const NAMES = { mitesh:'Mitesh', purva:'Purva', priyanka:'Priyanka', manish:'Manish', rajeev:'Rajeev' };
      
      if (USERS[username.toLowerCase()] === password) {
        user = { name: NAMES[username.toLowerCase()], email: username.toLowerCase() + '@demo.com', password: password };
      }
    }
    
    if (user) {
      if (user.password === password) {
        // Login successful
        localStorage.setItem('loggedInUser', user.name);
        localStorage.setItem('loggedInEmail', user.email);
        console.log('Login successful:', user.name);
        window.location.href = 'mainindex.html';
      } else {
        alert.textContent = 'Invalid password.';
        alert.style.display = 'block';
      }
    } else {
      // Try backend API as fallback
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (data.ok) {
        localStorage.setItem('mm_token', data.token);
        localStorage.setItem('mm_user', data.user.name);
        localStorage.setItem('mm_uname', data.user.username);
        window.location.href = 'mainindex.html';
      } else {
        alert.textContent = 'User not found or invalid credentials.';
        alert.style.display = 'block';
      }
    }
  } catch (error) {
    console.error('Login error:', error);
    alert.textContent = 'Login failed. Please try again.';
    alert.style.display = 'block';
  } finally {
    btn.disabled = false; label.textContent = 'Sign In'; spinner.classList.add('hidden');
  }
});
</script>
</body>
</html>
