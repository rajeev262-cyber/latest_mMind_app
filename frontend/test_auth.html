<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>MarketMind Authentication Test</h1>
    
    <div class="test-section">
        <h3>Current localStorage State</h3>
        <button onclick="showLocalStorage()">Show Current Data</button>
        <pre id="localStorageOutput">Click button to see localStorage contents</pre>
    </div>

    <div class="test-section">
        <h3>Test User Creation</h3>
        <input type="text" id="testName" placeholder="Name" value="Test User">
        <input type="email" id="testEmail" placeholder="Email" value="test@example.com">
        <input type="password" id="testPassword" placeholder="Password" value="1234">
        <button onclick="createTestUser()">Create Test User</button>
        <div id="createResult"></div>
    </div>

    <div class="test-section">
        <h3>Test Login</h3>
        <input type="text" id="loginEmail" placeholder="Email or Username" value="test@example.com">
        <input type="password" id="loginPassword" placeholder="Password" value="1234">
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="test-section">
        <h3>Clear All Data</h3>
        <button onclick="clearAllData()">Clear localStorage</button>
        <div id="clearResult"></div>
    </div>

    <script>
        function showLocalStorage() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                data[key] = localStorage.getItem(key);
            }
            document.getElementById('localStorageOutput').textContent = JSON.stringify(data, null, 2);
        }

        function createTestUser() {
            const name = document.getElementById('testName').value;
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            try {
                const userData = { name, email, password };
                localStorage.setItem(email, JSON.stringify(userData));
                
                document.getElementById('createResult').innerHTML = 
                    '<div class="success">✅ User created successfully!</div>';
                showLocalStorage();
            } catch (error) {
                document.getElementById('createResult').innerHTML = 
                    '<div class="error">❌ Error creating user: ' + error.message + '</div>';
            }
        }

        function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const userData = localStorage.getItem(email);
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.password === password) {
                        localStorage.setItem('loggedInUser', user.name);
                        localStorage.setItem('loggedInEmail', user.email);
                        
                        document.getElementById('loginResult').innerHTML = 
                            '<div class="success">✅ Login successful! Welcome ' + user.name + '</div>';
                    } else {
                        document.getElementById('loginResult').innerHTML = 
                            '<div class="error">❌ Invalid password</div>';
                    }
                } else {
                    document.getElementById('loginResult').innerHTML = 
                        '<div class="error">❌ User not found</div>';
                }
                showLocalStorage();
            } catch (error) {
                document.getElementById('loginResult').innerHTML = 
                    '<div class="error">❌ Login error: ' + error.message + '</div>';
            }
        }

        function clearAllData() {
            localStorage.clear();
            document.getElementById('clearResult').innerHTML = 
                '<div class="success">✅ All localStorage data cleared</div>';
            showLocalStorage();
        }

        // Show current state on load
        showLocalStorage();
    </script>
</body>
</html>
